# Render deployment configuration
# Backend is deployed as a Node.js web service on Render

services:
  - type: web
    name: mediassist-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false   # Set this in Render dashboard
      - key: OPENAI_API_KEY
        sync: false   # Set this in Render dashboard
      - key: CLIENT_URL
        sync: false   # Set to your Vercel frontend URL
